<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>運彩衝業績助手</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>運彩衝業績助手</h1>
      <p>固定利潤率 6.25%｜iPhone 版</p>
    </header>

    <nav class="tabs">
      <button class="tab active" data-page="calc">業績計算</button>
      <button class="tab" data-page="compare">賠率比較</button>
    </nav>

    <section id="calc" class="page active">
      <div class="card">
        <label>目標業績
          <input id="target" type="number" inputmode="decimal" value="500000" />
        </label>
        <label>客隊賠率
          <input id="awayOdds" type="number" inputmode="decimal" step="0.01" value="1.75" />
        </label>
        <label>主隊賠率
          <input id="homeOdds" type="number" inputmode="decimal" step="0.01" value="1.75" />
        </label>
        <label>利潤率
          <input id="profitRate" type="number" inputmode="decimal" step="0.01" value="6.25" />
        </label>
        <button id="calcBtn" class="primary">開始計算</button>
      </div>

      <div id="result" class="result"></div>
    </section>

    <section id="compare" class="page">
      <div class="card">
        <label>目標業績
          <input id="compareTarget" type="number" inputmode="decimal" value="500000" />
        </label>
        <label>貼上多組賠率（每行一組：客隊 主隊）
          <textarea id="oddsList" rows="8">1.75 1.75
1.80 1.80
1.85 1.85
1.90 1.90</textarea>
        </label>
        <button id="compareBtn" class="primary">比較並排序</button>
      </div>

      <div id="compareResult" class="compare"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
